<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StainCoin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/pulse/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="login" class="vh-100 vw-100" style="display:block">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="card col-8">
                <div class="card-header h2 text-center">StainCoin Login</div>
                <div class="card-body">
                    <label for="txtUser" class="form-label">Username:</label>
                    <input type="text" name="txtUser" id="txtUser" class="form-control" required>
                    <label for="txtPassword" class="form-label mt-3">Password:</label>
                    <input type="password" name="txtPassword" id="txtPassword" class="form-control" required>
                    <button id="loginButton" class="col-12 mt-3 btn btn-primary" type="button">Login</button>
                    <button id="submitButton" class="col-12 mt-3 btn btn-secondary" type="button">Sign Up</button>
                </div>
            </div>
        </div>
    </div>
    <div id="YourCoins" class="vw-100 vh-100" style="display:none">
        <div class="d-flex align-items-center justify-content-around">
            <h1 class="text-primary col-9">Welcome to StainCoin!</h1>
            <button id="logout" class="btn btn-secondary h-50 rounded-xl col-2">Logout</button>
        </div>
        <hr/>
        <div class="container text-center h-75">
            <div class="row h-100">
                <div class="col-8 h-100">
                    <div class="d-flex justify-content-around">
                        <h3>Your Mined Blocks</h3>
                        <button id="reloadButton" class="btn btn-outline-primary">Reload Coins</button>
                    </div>
                    <hr/>
                    <div id="divCoins" class="h-75 overflow-y-scroll">
                    </div>
                </div>
                <div class="col-4 mt-3">
                    Actions
                    <hr/>
                    <div class="mt-3">
                        <button id="makeNewCoin" class="btn btn-primary col-12" type="button">Mine New Block</button>
                        <div class="modal fade" id="mineModal">
                          <div class="modal-dialog">
                            <div class="modal-content">
                              <div class="modal-header">
                                <h1 class="modal-title fs-5" id="exampleModalLabel">Mine A New Block</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                              </div>
                              <div class="modal-body" id="mining" style="display:block">
                                <h2 class="h2">Reward: 10 Coins / Block</h2>
                                <div class="spinner-border mt-3"></div>
                                <div class="mt-3 h3 fw-light">Please do not click off this page until a block is mined.</div>
                              </div>
                              <div class="modal-body" id="blockFound" style="display:none">
                                <h2 class="h2" id="mineStatusTitle">Block mined!</h2>
                                <div class="mt-3 h5 fw-light" id="mineStatusMessage">Your block was added successfully.</div>
                              </div>
                              <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="button" class="btn btn-primary">Save changes</button>
                              </div>
                            </div>
                          </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <button id="makeNewTransaction" class="btn btn-dark col-12" data-bs-toggle="modal" data-bs-target="#transModal" type="button">Make A Transaction</button>
                        <div class="modal fade" id="transModal">
                          <div class="modal-dialog">
                            <div class="modal-content">
                              <div class="modal-header">
                                <h1 class="modal-title fs-5" id="exampleModalLabel">Make A New Transaction</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                              </div>
                              <div class="modal-body">
                                <div>
                                    <label for="intAmt" class="form-label">Amount to transfer:</label>
                                    <input type="number" id="intAmt" class="form-control">
                                </div>
                                <div class="mt-2">
                                    <label for="txtRecipient" class="form-label">Who to transfer to:</label>
                                    <input type="text" id="txtRecipient" class="form-control">
                                </div>
                              </div>
                              <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="button" class="btn btn-primary" id="saveTransaction">Save changes</button>
                              </div>
                            </div>
                          </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <button id="seeFullChain" class="btn btn-secondary col-12" type="button">See Full Chain</button>
                        <div class="modal fade" id="chainModal">
                          <div class="modal-dialog">
                            <div class="modal-content">
                              <div class="modal-header">
                                <h1 class="modal-title fs-5" id="exampleModalLabel">Full Chain</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                              </div>
                              <div class="modal-body h-50 overflow-y-scroll" id="chain">
                              </div>
                              <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                              </div>
                            </div>
                          </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 fixed-bottom h1 bg-body">
                <hr>
                <div>Your coins: <span id="coinCount"></span></div>
                <hr>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        let authAlertTimeout = null
        let mineModalTimeout = null
        let mineSequence = 0

        const waitForModalHidden = (modalElement, fallbackMs = 400) => {
            return new Promise((resolve) => {
                let finished = false

                const complete = () => {
                    if (finished) {
                        return
                    }

                    finished = true
                    modalElement.removeEventListener('hidden.bs.modal', complete)
                    resolve()
                }

                modalElement.addEventListener('hidden.bs.modal', complete, {once: true})
                setTimeout(complete, fallbackMs)
            })
        }

        getCoins = async (username) => {
            let coins = await fetch(`http://localhost:8000/coins/${username}`)
            let coinCount = await fetch(`http://localhost:8000/coinCount/${username}`)
            let coinArray = await coins.json()
            let intCoinCount = await coinCount.json()

            let coinHtml = ''

            coinArray.forEach(coin => {
                coinHtml += `<div class='card card-body card col-12 mb-2'><div class="d-flex justify-content-around"><h6>Coin ${coin.Index}</h6><h6>Hash: ${coin.Hash}</h6></div><div class="d-flex justify-content-around mt-3"><h6 class="fw-light">Time generated: ${coin.Time}</h6><h6 class="fw-light">Previous Hash: ${coin.PrevHash}</h6><h6 class="fw-light">Nonce: ${coin.Nonce}</h6></div></div>`
            })

            document.querySelector('#divCoins').innerHTML = coinHtml
            document.querySelector("#coinCount").innerHTML = intCoinCount.Coins
        }
        
        document.querySelector('#loginButton').addEventListener('click', async () => {
            const username = document.querySelector('#txtUser').value
            const password = document.querySelector('#txtPassword').value
            let errHtml = ""

            if (username == ""){
                errHtml += "<div>Username cannot be empty.</div>"
            }

            if (password == ""){
                errHtml += "<div>Password cannot be empty.</div>"
            }

            async function login(username, password, errMsg) {
                try {
                    const loginEvent = await fetch("http://localhost:8000/login", {method: "POST", body: JSON.stringify({username: `${username}`, password: `${password}`}), headers: {"Content-Type": "application/json"}})
                    const loginResult = await loginEvent.json()
                    if (username != '' && password != '' && loginResult.outcome == "success"){
                        if (authAlertTimeout) {
                            clearTimeout(authAlertTimeout)
                        }
                        Swal.fire({
                            icon: "success",
                            title: "Successfully logged in!",
                        })
                        sessionStorage.setItem("username", `${username}`)

                        authAlertTimeout = setTimeout(() => {
                            Swal.close()
                            document.querySelector('#login').style.display = "none"
                            document.querySelector('#YourCoins').style.display = "block"
                        }, 2000)
                        return ""
                    } else {
                        errMsg += loginResult.message
                        return errMsg
                    }
                } catch (err) {
                    console.log(err.message)
                    return errMsg
                }
            }

            errHtml = await login(username, password, errHtml)

            getCoins(sessionStorage.getItem("username"))

            if (errHtml.trim() != "") {
                return Swal.fire({
                    icon: "error",
                    html: errHtml,
                    title: "Uh Oh!"
                })
            }
        })

        document.querySelector('#makeNewCoin').addEventListener('click', async () => {
            const localMineSequence = ++mineSequence
            const mineModal = new bootstrap.Modal(document.querySelector('#mineModal'))
            if (mineModalTimeout) {
                clearTimeout(mineModalTimeout)
                mineModalTimeout = null
            }
            mineModal.show()

            document.querySelector('#mining').style.display = "block"
            document.querySelector('#blockFound').style.display = "none"
            document.querySelector('#mineStatusTitle').innerHTML = "Block mined!"
            document.querySelector('#mineStatusMessage').innerHTML = "Your block was added successfully."
            try{
                let block = await fetch(`http://localhost:8000/mine`, {method: "POST", body: JSON.stringify({username: `${sessionStorage.getItem("username")}`}), headers: {"Content-Type": "application/json"}})
                let blockData = await block.json()

                if (blockData.outcome == "success") {
                    document.querySelector('#mining').style.display = "none"
                    document.querySelector('#blockFound').style.display = "block"
                    document.querySelector('#mineStatusTitle').innerHTML = "Block mined!"
                    document.querySelector('#mineStatusMessage').innerHTML = blockData.message
                    mineModalTimeout = setTimeout(() => {
                        if (localMineSequence !== mineSequence) {
                            return
                        }

                        mineModal.hide()
                        getCoins(sessionStorage.getItem("username"))
                    }, 2000)
                } else if (blockData.message == "No transactions exist to mine") {
                    document.querySelector('#mining').style.display = "none"
                    document.querySelector('#blockFound').style.display = "block"
                    document.querySelector('#mineStatusTitle').innerHTML = "No transaction to mine"
                    document.querySelector('#mineStatusMessage').innerHTML = "Submit a transaction first, then try mining again."
                    mineModalTimeout = setTimeout(() => {
                        if (localMineSequence !== mineSequence) {
                            return
                        }

                        mineModal.hide()
                    }, 2000)
                } else {
                    mineSequence += 1
                    mineModal.hide()
                    Swal.fire({
                        icon: "error",
                        title: "Uh Oh!",
                        html: blockData.message
                    })
                }
            }catch(err){
                console.log(err.message)
            }
            })

        document.querySelector('#saveTransaction').addEventListener('click', async () => {
            const sender = sessionStorage.getItem("username")
            const amount = document.querySelector('#intAmt').value
            const recipient = document.querySelector('#txtRecipient').value.trim()
            const transModalElement = document.querySelector('#transModal')
            const transModal = bootstrap.Modal.getInstance(transModalElement)

            try {
                const transactionEvent = await fetch("http://localhost:8000/transaction", {
                    method: "POST",
                    body: JSON.stringify({sender: `${sender}`, recipient: `${recipient}`, amount: `${amount}`}),
                    headers: {"Content-Type": "application/json"}
                })
                const transactionResult = await transactionEvent.json()

                if (transactionResult.outcome == "success") {
                    if (authAlertTimeout) {
                        clearTimeout(authAlertTimeout)
                        authAlertTimeout = null
                    }
                    document.querySelector('#intAmt').value = ""
                    document.querySelector('#txtRecipient').value = ""
                    transModal.hide()
                    await waitForModalHidden(transModalElement)
                    await Swal.fire({
                        icon: "success",
                        title: "Transaction queued!",
                        html: transactionResult.message,
                        allowOutsideClick: false
                    })
                    getCoins(sender)
                } else {
                    if (authAlertTimeout) {
                        clearTimeout(authAlertTimeout)
                        authAlertTimeout = null
                    }
                    Swal.fire({
                        icon: "error",
                        title: "Uh Oh!",
                        html: transactionResult.message
                    })
                }
            } catch (err) {
                console.log(err.message)
            }
        })

        document.querySelector('#submitButton').addEventListener('click', async (req, res, next) => {
            const username = document.querySelector('#txtUser').value
            const password = document.querySelector('#txtPassword').value
            let errHtml = ""

            if (username == ""){
                errHtml += "<div>Username cannot be empty.</div>"
            }

            if (password == ""){
                errHtml += "<div>Password cannot be empty.</div>"
            }

            let signUpEvent = await fetch("http://localhost:8000/user", {method: "POST", body: JSON.stringify({username: `${username}`, password: `${password}`}), headers: {"Content-Type": "application/json"}})
            let signUpRes = await signUpEvent.json()

            if (errHtml == "" && signUpRes.outcome != 'failure') {
                if (authAlertTimeout) {
                    clearTimeout(authAlertTimeout)
                }
                Swal.fire({
                    icon: "success",
                    title: "Account successfully created!"
                })
                authAlertTimeout = setTimeout(() => {
                    Swal.close()
                    document.querySelector('#login').style.display = "none"
                    document.querySelector('#YourCoins').style.display = "block"
                }, 2000)
            } else {
                errHtml += signUpRes.message
            }

            if (errHtml.trim() != ""){
                Swal.fire({
                icon: "error",
                title: "Uh Oh!",
                html: errHtml
            })
            }
        })

        document.querySelector('#logout').addEventListener('click', () => {
            sessionStorage.clear()
            document.querySelector('#login').style.display = "block"
            document.querySelector('#YourCoins').style.display = "none"
        })

        document.querySelector('#reloadButton').addEventListener('click', () => {
            getCoins(sessionStorage.getItem("username"))
        })

         document.querySelector('#seeFullChain').addEventListener('click', async () => {
            let chain = await fetch("http://localhost:8000/wholeChain")
            let chainData = await chain.json()

            const chainModal = new bootstrap.Modal(document.querySelector('#chainModal'))
            chainModal.show()

            innerHtmlStuff = ''
            chainData.forEach(block => {
                innerHtmlStuff += `<div>|</div><div class="card"><div class="card-body">Hash: ${block.hash}</div></div>`
            })

            document.querySelector('#chain').innerHTML = innerHtmlStuff

         })

         const savedUsername = sessionStorage.getItem("username")
        if (savedUsername) {
            document.querySelector('#login').style.display = "none"
            document.querySelector('#YourCoins').style.display = "block"
            getCoins(savedUsername)
        }
    </script>
</body>
</html>
